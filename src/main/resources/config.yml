# ==========================================
#          LMenus Config
# ==========================================

settings:
  prefix: "&8[&bLMenus&8] "

messages:
  menu_not_found: "&cMenu not found."
  menu_already_exists: "&cA menu with that name already exists!"
  invalid_size: "&cInvalid size! Please use rows (1-6) or exact slots (9, 18, 27, 36, 45, 54)."
  menu_resized: "&aSuccessfully resized menu &e{menu} &ato &e{size} &aslots!"
  menu_created: "&aCreating menu '{name}'. Place items and close the inventory to save!"
  menu_editing: "&eEditing menu '{name}'. Close the inventory to save changes."
  menu_saved: "&aMenu '{name}' has been saved successfully!"
  menu_deleted: "&aMenu '{name}' has been permanently deleted."
  menu_retitled: "&aMenu '{name}' has been retitled."
  no_menus: "&eThere are currently no menus created."
  reload_success: "&aSuccessfully reloaded {count} menus and config from disk!"
  session_closed: "&cAn admin reloaded LMenus. Your session was safely closed."
  menu_list: "&7Available menus&8: &b{menus}"
  menu_info:
    - "&7=== &bMenu Info: &a{name} &7==="
    - "&bTitle: &r{title}"
    - "&bSize: &f{size} slots"
    - "&bItems configured: &f{items}"
    - "&bCreated by: &f{creator}"
    - "&bCreated on: &f{date}"
  click_to_bind: "&ePlease click any slot in the menu to bind the button to it."
  button_added: "&aSuccessfully bound the button to slot {slot}!"
  click_to_remove: "&cPlease click a slot to wipe all commands from it."
  button_removed: "&aSuccessfully cleared all commands from slot {slot}!"
  on_cooldown: "&cYou must wait {time} seconds before using this button again!"
  flag_set: "&aSuccessfully updated the '{flag}' flag for this menu!"
  flag_removed: "&aSuccessfully removed the '{flag}' flag from this menu."
  button_flag_set: "&aSuccessfully updated the flag for the button at slot {slot}."
  no_buttons_on_slot: "&cThere are no buttons configured on slot {slot}."
  click_to_flag: "&ePlease click the button you want to apply this flag to."
  flag_list:
    - "&7=== &bLMenus&7: &fAvailable Flags &7==="
    - "&eMenu Flags &7(/lm flag menu ...)"
    - "  &8- &bauto_refresh &f<true/false>"
    - "  &8- &brefresh_ticks &f<number> &8(Default: 20)"
    - "  &8- &bfiller_item &f<material_name/none>"
    - ""
    - "&eButton Flags &7(/lm flag button ...)"
    - "  &8- &bcooldown &f<seconds>"
    - "  &8- &bclose_on_click &f<true/false> &8(Default: true)"
  no_permission_menu: "&cYou do not have permission to open this menu."
  no_permission_button: "&cYou do not have permission to use this button."
  not_enough_money: "&cYou do not have enough money! This costs ${cost}."
  money_withdrawn: "&aSuccessfully purchased for &e${cost}&a."
